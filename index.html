<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MV-Fashion</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f9f9f7;
      font-family: Georgia, 'Times New Roman', serif;
      color: #1a1a1a;
      padding: 2rem;
    }

    .container {
      max-width: 720px;
      text-align: center;
    }

    .badge {
      display: inline-block;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #666;
      border: 1px solid #ccc;
      border-radius: 2rem;
      padding: 0.3rem 0.9rem;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: normal;
      line-height: 1.4;
      margin-bottom: 1rem;
      color: #111;
    }

    h1 em {
      font-style: italic;
      color: #333;
    }

    .divider {
      width: 3rem;
      height: 2px;
      background-color: #d0c8b0;
      margin: 1.75rem auto;
    }

    .coming-soon {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: #555;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Research Paper</div>
    <h1>
      MV-Fashion: Towards Enabling Virtual Try-On and Size Estimation
      with <em>Multi-View Paired Data</em>
    </h1>
    <div class="divider"></div>
    <p class="coming-soon">Website coming soon.</p>
  </div>
</body>
</html>
